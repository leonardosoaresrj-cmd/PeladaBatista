server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ══════════════════════════════════════════════════════
    # REGRA 1 — index.html: NUNCA usar cache
    # É o ponto de entrada da SPA. Se ficar em cache,
    # o browser carrega JS/CSS antigos mesmo após deploy.
    # ══════════════════════════════════════════════════════
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header X-App-Version "$hostname";
        try_files $uri /index.html;
    }

    # ══════════════════════════════════════════════════════
    # REGRA 2 — JS, CSS e outros assets com HASH no nome
    # Ex: assets/index-Ab3Cd4Ef.js
    # O Vite já garante nomes únicos por build via hash.
    # Pode cachear por 1 ano com segurança — se o conteúdo
    # mudar, o hash muda e o browser baixa o arquivo novo.
    # ══════════════════════════════════════════════════════
    location ~* ^/assets/.*\.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ══════════════════════════════════════════════════════
    # REGRA 3 — Outros arquivos estáticos (sem hash)
    # Revalida a cada hora — equilibra performance e frescor
    # ══════════════════════════════════════════════════════
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|webp|json)$ {
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        try_files $uri =404;
    }

    # ══════════════════════════════════════════════════════
    # REGRA 4 — Rotas SPA (React Router)
    # Qualquer rota não encontrada → index.html (sem cache)
    # ══════════════════════════════════════════════════════
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri $uri/ /index.html;
    }

    # ══════════════════════════════════════════════════════
    # COMPRESSÃO GZIP
    # ══════════════════════════════════════════════════════
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/xml
        application/json
        application/manifest+json
        image/svg+xml
        font/woff
        font/woff2;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
