<svg width="100%" height="100%" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Sombra Projetada do Escudo -->
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="145%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.65"/>
    </filter>
    <filter id="foamShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    
    <!-- Gradients -->
    <linearGradient id="beerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFDD67" />
      <stop offset="35%" stop-color="#FFB31C" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#112A46" />
      <stop offset="50%" stop-color="#061224" />
      <stop offset="100%" stop-color="#020813" />
    </linearGradient>
    <linearGradient id="goldBorderGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCE181" />
      <stop offset="50%" stop-color="#CFA13C" />
      <stop offset="100%" stop-color="#966F1C" />
    </linearGradient>
    <linearGradient id="glassReflection" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="20%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="diagonalStripeSilver" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#94a3b8" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="diagonalStripeGold" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0%" stop-color="#FCE38A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#CFA13C" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Corpo do Escudo / Shield Silhouette -->
  <!-- Curva arqueada no topo, rebaixos laterais de heráldica moderna e ponta triangular bem definida em baixo -->
  <g filter="url(#shadow)">
    <!-- Borda Externa Dourada do Escudo -->
    <path d="M 50 120 C 50 120 120 100 250 100 C 380 100 450 120 450 120 C 454 135 457 155 452 185 C 445 235 435 375 250 455 C 65 375 55 235 48 185 C 43 155 46 135 50 120 Z" fill="url(#shieldGrad)" stroke="url(#goldBorderGrad)" stroke-width="12" stroke-linejoin="round" />
    
    <!-- Contorno Dourado Interno -->
    <path d="M 64 130 C 64 130 130 113 250 113 C 370 113 436 130 436 130 C 436 215 418 360 250 437 C 82 360 64 215 64 130 Z" fill="none" stroke="#E2C175" stroke-width="2" opacity="0.6" stroke-linejoin="round" />
  </g>

  <!-- Listras Diagonais de Fundo (Visual Dinâmico) -->
  <g clip-path="url(#shieldClip)">
    <!-- Para garantir o clip sem quebrar caminhos, desenhamos dentro das dimensões úteis do escudo -->
    <path d="M 64 250 L 436 345 L 436 385 L 64 290 Z" fill="url(#diagonalStripeGold)" />
    <path d="M 64 220 L 436 315 L 436 335 L 64 240 Z" fill="url(#diagonalStripeSilver)" />
  </g>

  <!-- Texto Arqueado Principal "PELADA BATISTA" -->
  <path id="curve-title" d="M 85 160 C 130 144 370 144 415 160" fill="none" />
  <text font-family="'Inter', 'Impact', 'Trebuchet MS', sans-serif" font-weight="900" font-size="33" fill="#FFFFFF" letter-spacing="1">
    <textPath href="#curve-title" startOffset="50%" text-anchor="middle">
      PELADA BATISTA
    </textPath>
  </text>
  
  <!-- Subtítulo Retilíneo "FUTEBOL & RESENHA" em Ouro -->
  <text x="250" y="196" font-family="'Inter', sans-serif" font-weight="800" font-size="14" fill="#E2C175" text-anchor="middle" letter-spacing="5">
    FUTEBOL &amp; RESENHA
  </text>

  <!-- BOLA DE FUTEBOL (Atrás do Copo de Cerveja à Direita) -->
  <g transform="translate(295, 310) scale(0.85)">
    <!-- Sombra sutil da bola -->
    <circle cx="2" cy="4" r="56" fill="#000" opacity="0.3" filter="url(#shadow)" />
    <circle cx="0" cy="0" r="56" fill="#FFFFFF" stroke="#0F172A" stroke-width="4.5" />
    
    <!-- Pentágono Central -->
    <polygon points="0,-18 17,-5 10.5,15 -10.5,15 -17,-5" fill="#0F172A" />
    
    <!-- Painéis do Entorno e Gomos -->
    <!-- Superior -->
    <line x1="0" y1="-18" x2="0" y2="-56" stroke="#0F172A" stroke-width="4.5" />
    <polygon points="0,-56 -24,-42 -16.5,-23" fill="#0F172A" /> 
    <polygon points="0,-56 24,-42 16.5,-23" fill="#0F172A" /> 
    
    <!-- Lado Superior Direito -->
    <line x1="17" y1="-5" x2="53" y2="-17" stroke="#0F172A" stroke-width="4.5" />
    <!-- Gomo Direito Alto -->
    <polygon points="53,-17 48,15 28,15" fill="none" stroke="#0F172A" stroke-width="4.5" />
    
    <!-- Lado Inferior Direito -->
    <line x1="10.5" y1="15" x2="33" y2="45" stroke="#0F172A" stroke-width="4.5" />
    <!-- Gomo Direito Baixo -->
    <polygon points="33,45 47,15 10.5,15" fill="none" stroke="#0F172A" stroke-width="4.5" />
    <polygon points="53,-17 48,15 55,3" fill="#0F172A" />
    
    <!-- Lado Inferior Esquerdo -->
    <line x1="-10.5" y1="15" x2="-33" y2="45" stroke="#0F172A" stroke-width="4.5" />
    <!-- Gomo Esquerdo Baixo -->
    <polygon points="-33,45 -47,15 -10.5,15" fill="none" stroke="#0F172A" stroke-width="4.5" />
    
    <!-- Lado Superior Esquerdo -->
    <line x1="-17" y1="-5" x2="-53" y2="-17" stroke="#0F172A" stroke-width="4.5" />
    <!-- Gomo Esquerdo Alto -->
    <polygon points="-53,-17 -48,15 -28,15" fill="none" stroke="#0F172A" stroke-width="4.5" />
    <polygon points="-53,-17 -48,15 -55,3" fill="#0F172A" />

    <!-- Unindo gomos nas bordas -->
    <polygon points="33,45 0,56 -33,45" fill="none" stroke="#0F172A" stroke-width="4.5" />
    <polygon points="33,45 48,15 54,34" fill="#0F172A" />
    <polygon points="-33,45 -48,15 -54,34" fill="#0F172A" />
    <polygon points="0,56 -14,54 0,42 14,54" fill="#0F172A" />
  </g>

  <!-- COPO DE CERVEJA (Na Frente, Centro-Esquerda) -->
  <g transform="translate(180, 280)">
    <!-- Líquido Dourado com Degradê Realista -->
    <path d="M 16 50 L 19 114 C 19 126 43 126 43 114 L 46 50 Z" fill="url(#beerGrad)" />
    
    <!-- Bolhas de Carbonatação subindo -->
    <circle cx="21" cy="72" r="2.2" fill="#FFFFFF" opacity="0.8" />
    <circle cx="37" cy="62" r="3" fill="#FFFFFF" opacity="0.9" />
    <circle cx="28" cy="88" r="1.8" fill="#FFFFFF" opacity="0.7" />
    <circle cx="39" cy="98" r="2.5" fill="#FFFFFF" opacity="0.85" />
    <circle cx="23" cy="103" r="3.2" fill="#FFFFFF" opacity="0.6" />
    <circle cx="19" cy="83" r="1.8" fill="#FFFFFF" opacity="0.75" />
    <circle cx="31" cy="76" r="2.5" fill="#FFFFFF" opacity="0.6" />
    <circle cx="41" cy="80" r="1.5" fill="#FFFFFF" opacity="0.8" />

    <!-- Corpo de Vidro e Base Robusta do Copo -->
    <path d="M 12 40 L 17 114 C 17 132 45 132 45 114 L 50 40" fill="none" stroke="#F1F5F9" stroke-width="6" stroke-linecap="round" />
    <path d="M 17 114 C 17 130 45 130 45 114 Z" fill="#E2E8F0" opacity="0.7" />
    
    <!-- Reflexo de Luz no Copo -->
    <path d="M 14 46 L 16 108" stroke="url(#glassReflection)" stroke-width="3" stroke-linecap="round" />

    <!-- Colarinho Cremoso de Espuma transbordando -->
    <g filter="url(#foamShadow)">
      <!-- Círculos combinados para formar a espuma volumosa ("Cloud foam") -->
      <circle cx="7" cy="40" r="12.5" fill="#FFFFFF" />
      <circle cx="21" cy="34" r="15" fill="#FFFFFF" />
      <circle cx="37" cy="33" r="15" fill="#FFFFFF" />
      <circle cx="51" cy="39" r="12" fill="#FFFFFF" />
      
      <!-- Retalho de preenchimento de topo -->
      <path d="M 5 42 Q 25 18 45 37 C 55 45 61 28 41 23 Q 25 6 7 26 C -3 36 0 44 5 42 Z" fill="#FFFFFF" />
    </g>
    
    <!-- Textura/detalhes na espuma -->
    <circle cx="14" cy="28" r="1.5" fill="#E2E8F0" />
    <circle cx="28" cy="23" r="2" fill="#E2E8F0" />
    <circle cx="35" cy="26" r="1.4" fill="#E2E8F0" />
    <circle cx="44" cy="33" r="1.5" fill="#E2E8F0" />
  </g>
</svg>
